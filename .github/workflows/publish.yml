name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + --provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # npm OIDC trusted publishing requires npm >= 11.5.1.
      # Node 20 ships with npm 10.x, so upgrade before publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Diagnostic: prints the claims GitHub will assert in the OIDC token sent
      # to npm. Compare against the npm trusted-publisher rule to find any
      # mismatch (capitalization, workflow filename, environment, etc.).
      # Safe to log: the claims segment is not a secret; only the full signed
      # JWT would be sensitive, and we never print that.
      - name: Debug OIDC claims (npm audience)
        run: |
          TOKEN=$(curl -sLS \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r .value)
          echo "=== OIDC claims (npm audience) ==="
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION (matches tag v$TAG_VERSION)"

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm publish --access public --provenance
